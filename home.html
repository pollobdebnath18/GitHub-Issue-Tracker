<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <!-- tailwind+daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <!-- Navbar -->
      <nav>
        <div class="navbar bg-base-100 shadow-sm">
          <div class="navbar-start ml-5">
            <div class="flex justify-center items-center gap-3">
              <img class="w-[30px]" src="assets/github-logo.png" alt="" />
              <h2 class="text-xl font-semibold hidden sm:block">
                GitHub Issues Tracker
              </h2>
            </div>
          </div>

          <div class="navbar-end mr-5 flex gap-4">
            <label class="input w-50">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input type="search" required placeholder="Search" />
            </label>
            <a class="btn btn-primary">+ New Issue</a>
          </div>
        </div>
      </nav>
      <!--Count issue -->
      <section class="w-11/12 mx-auto pt-10">
        <div class="bg-white shadow-sm p-5 flex gap-4 rounded-lg mb-4">
          <button class="btn btn-primary">All</button>
          <button class="btn">Open</button>
          <button class="btn">Closed</button>
        </div>
        <div
          class="bg-white shadow-sm p-5 flex justify-between items-center rounded-sm"
        >
          <div class="flex justify-center items-center gap-4">
            <img
              class="bg-[#ECE4FF] rounded-full p-1.5"
              src="assets/Aperture.png"
              alt=""
            />
            <div>
              <h2 class="font-semibold text-[20px]">50 Issues</h2>
              <h2 class="text-[14px] text-[#64748B]">
                Track and manage your project issues
              </h2>
            </div>
          </div>
          <div class="flex justify-center items-center gap-4">
            <p class="flex items-center gap-2">
              <span
                class="bg-[#00A96E] rounded-full w-4 h-4 inline-block"
              ></span>
              Open
            </p>
            <p class="flex items-center gap-2">
              <span
                class="bg-[#A855F7] rounded-full w-4 h-4 inline-block"
              ></span>
              Closed
            </p>
          </div>
        </div>
      </section>
      <!-- show all issue card -->
      <section class="w-11/12 mx-auto pt-10 pb-10 grid grid-cols-4 gap-4">
        <!-- card -->
        <div class="bg-white shadow-xl rounded-xl px-5 py-3 space-y-3">
          <div class="flex justify-between items-center">
            <img class="w-8 h-8" src="assets/Open-Status.png" alt="" />
            <p
              class="text-[#EF4444] bg-[#FEECEC] px-5 py-2 rounded-b-2xl rounded-t-2xl"
            >
              Help
            </p>
          </div>
          <div>
            <h2 class="text-[17px] font-semibold">
              Fix navigation menu on mobile devices
            </h2>
          </div>
          <div>
            <p class="text-[12px] text-[#64748B]">
              The navigation menu doesn't collapse properly on mobile devices...
            </p>
          </div>
          <div class="flex justify-start items-center gap-2">
            <p
              class="text-[#EF4444] bg-[#FEECEC] text-[12px] px-2 py-1 rounded-b-2xl rounded-t-2xl"
            >
              <i class="fa-solid fa-bug"></i> BUG
            </p>
            <p
              class="text-[#F59E0B] bg-[#FFF6D1] text-[12px] px-2 py-1 rounded-b-2xl rounded-t-2xl"
            >
              <i class="fa-solid fa-life-ring"></i> HELP WANTED
            </p>
          </div>

          <div>
            <div class="divider -mx-5"></div>

            <p class="text-[13px] text-[#64748B]">#1 by john_doe</p>
            <p class="text-[13px] text-[#64748B] p-2">1/15/2024</p>
          </div>
        </div>
      </section>
    </main>

    <script src="functionality.js"></script>
  </body>
</html>
