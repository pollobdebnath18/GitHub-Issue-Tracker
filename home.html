<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <!-- tailwind+daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
        <!-- Navbar -->
      <nav>
        <div class="navbar bg-base-100 shadow-sm">
          <div class="navbar-start ml-5">
            <div class="flex justify-center items-center gap-3">
              <img class="w-[30px]" src="assets/github-logo.png" alt="" />
              <h2 class=" text-xl font-semibold hidden sm:block">
                GitHub Issues Tracker
              </h2>
            </div>
          </div>

          <div class="navbar-end mr-5 flex gap-4">
            <label class="input w-50">
              <svg
                class="h-[1em] opacity-50"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
              >
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2.5"
                  fill="none"
                  stroke="currentColor"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <path d="m21 21-4.3-4.3"></path>
                </g>
              </svg>
              <input type="search" required placeholder="Search" />
            </label>
            <a class="btn btn-primary">+ New Issue</a>
          </div>
        </div>
      </nav>
      <section class="w-11/12 mx-auto pt-10">
        <div class="bg-white shadow-sm p-5 flex gap-4 rounded-lg">
            <button class="btn btn-primary">All</button>
            <button class="btn">Open</button>
            <button class="btn">Closed</button>
        </div>
      </section>
    </main>
  </body>
</html>
