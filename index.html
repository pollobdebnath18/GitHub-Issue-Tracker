<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker</title>
    <!-- tailwind+daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header
      class="max-w-sm mx-auto max-h-screen bg-white shadow-2xl mt-6 p-5 rounded-lg space-y-3"
    >
      <div class="space-y-2 text-center">
        <img class="mx-auto" src="assets/github-logo.png" alt="" />
        <div>
          <h2 class="text-[24px] font-semibold">GitHub Issues Tracker</h2>
          <h3 class="text-[14px] text-[#64748B]">
            Sign in to manage your issues
          </h3>
        </div>
      </div>
      <div>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">UserName</legend>
          <input id="username" required type="text" class="input" placeholder="Enter Username" />
          <p class="label">Default: admin</p>
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Password</legend>
          <input id="password" required  type="password" class="input" placeholder="Enter Password" />
          <p class="label">Default: admin123</p>
        </fieldset>
      </div>
      <div>
        <button onclick="login()" class="btn btn-primary w-full">Sign In</button>
      </div>
      <div>
        <div class="divider">OR</div>
      </div>
      <div class="text-center">
        <h2 class="text-[14px] text-[#64748B]">Demo Credentials:</h2>
        <div class="bg-[#F8FAFC] p-2 text-[12px] ">
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
      </div>
    </header>

    <script src="functionality.js"></script>
  </body>
</html>
